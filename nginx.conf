server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para performance (Core Web Vitals)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache para assets estáticos (CSS, JS, fontes, imagens)
    location ~* \.(css|js|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|webp|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location = /favicon.svg {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: sem cache (sempre busca o mais recente)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Fallback para SPA (se precisar no futuro)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
